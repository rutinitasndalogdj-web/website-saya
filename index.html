<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onyx TikTok Downloader — Tuan Kenzckk</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --accent: #fe2c55;
            --accent-glow: rgba(254, 44, 85, 0.4);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between; }

        header { padding: 30px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .welcome-text { font-size: 1.1rem; color: var(--accent); font-weight: 600; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        h1 { font-size: 2.2rem; font-weight: 800; }
        h1 span { color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }

        .main-container { max-width: 600px; margin: 40px auto; padding: 0 20px; width: 100%; flex: 1; }
        
        .card {
            background: var(--card-bg); padding: 35px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input[type="text"] {
            flex: 1; padding: 15px; background: #1f2937; border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px; color: var(--text-main); font-size: 1rem; outline: none; transition: 0.3s;
        }
        input[type="text"]:focus { border-color: var(--accent); }

        button {
            padding: 15px 30px; background: var(--accent); color: #fff; border: none;
            border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 15px var(--accent-glow);
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 0 25px var(--accent-glow); }

        .result-box { margin-top: 25px; display: none; text-align: center; }
        .result-box img { max-width: 150px; border-radius: 8px; margin-bottom: 15px; }
        .download-btn {
            display: block; width: 100%; padding: 12px; background: #25f4ee; color: #000;
            text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px; transition: 0.3s;
        }
        .download-btn:hover { background: #1bc7c3; }

        .loader { display: none; width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        footer { text-align: center; padding: 25px; color: var(--text-muted); font-size: 0.9rem; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <header>
        <div class="welcome-text">Selamat Datang, Tuan Kenzckk</div>
        <h1>TikTok <span>Downloader</span></h1>
    </header>

    <div class="main-container">
        <div class="card">
            <div class="input-group">
                <input type="text" id="urlInput" placeholder="Tempel tautan TikTok di sini...">
                <button onclick="fetchVideo()">Proses</button>
            </div>
            
            <div class="loader" id="loader"></div>

            <div class="result-box" id="resultBox">
                <img id="videoThumb" src="" alt="Thumbnail">
                <p id="videoTitle" style="margin-bottom: 15px; font-size: 0.95rem; color: var(--text-muted);"></p>
                <a id="downloadLinkNoWm" class="download-btn" href="#" target="_blank">Download Tanpa Watermark</a>
                <a id="downloadLinkWm" class="download-btn" style="background: #334155; color: #fff; margin-top: 8px;" href="#" target="_blank">Download Dengan Watermark</a>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Onyx Systems. Dibuat khusus untuk Tuan Kenzckk.</p>
    </footer>

    <script>
        async function fetchVideo() {
            const url = document.getElementById('urlInput').value.trim();
            const loader = document.getElementById('loader');
            const resultBox = document.getElementById('resultBox');
            
            if (!url) {
                alert('Silakan masukkan tautan TikTok terlebih dahulu, Tuan.');
                return;
            }

            loader.style.display = 'block';
            resultBox.style.display = 'none';

            try {
                // Menggunakan API publik TikWM untuk mengambil data video tanpa watermark
                const response = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const json = await response.json();

                if (json.code === 0) {
                    const data = json.data;
                    document.getElementById('videoThumb').src = data.cover;
                    document.getElementById('videoTitle').textContent = data.title;
                    document.getElementById('downloadLinkNoWm').href = 'https://www.tikwm.com' + data.play;
                    document.getElementById('downloadLinkWm').href = 'https://www.tikwm.com' + data.wmplay;
                    
                    loader.style.display = 'none';
                    resultBox.style.display = 'block';
                } else {
                    loader.style.display = 'none';
                    alert('Gagal mengambil video. Pastikan tautan valid.');
                }
            } catch (error) {
                loader.style.display = 'none';
                alert('Terjadi kesalahan jaringan.');
            }
        }
    </script>

</body>
</html>
